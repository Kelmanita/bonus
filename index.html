<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bonus Dashboard</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin:0; padding:0;
  width:100vw; height:100vh;
  overflow:hidden;
  background:#fff;
  font-family: Arial, sans-serif;
}

body { font-size: 18px; }

.wrap { height:100vh; display:flex; flex-direction:column; }

.topbar{
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 18px;
  border-bottom:1px solid #eee;
}

.title{ font-size:22px; font-weight:800; }
.status{ font-size:16px; opacity:.75; white-space:nowrap; }

.grid{
  flex:1;
  display:grid;
  grid-template-rows: 1.7fr 1.3fr;
  gap:14px;
  padding:14px 18px;
  min-height:0;
}

.row2{
  display:grid;
  grid-template-columns: 1fr;
  min-height:0;
}

.row2 > .card:first-child{ display:none; }

.row2 > .card:last-child{
  justify-self: center;
  align-self: center;
  width: 40%;
}

.card{
  border:1px solid #eee;
  border-radius:14px;
  padding:14px;
  min-height:0;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

.card.engpl {
  width: 75%;
  margin: 0 auto;
}

.card h2{
  margin:0 0 10px 0;
  font-size:22px;
}

.chartHost{
  flex:1 1 auto;
  min-height:0;
  min-width:0;
}

.plot{
  position:relative;
  border:1px solid #eee;
  border-radius:12px;
  overflow:hidden;
  min-height:0;
}

canvas{
  width:100%;
  height:100%;
  display:block;
}

.xlabels{
  display:flex;
  justify-content:center;
  gap:8px;
  padding-top:10px;
}

.xlabel{
  font-weight:900;
  font-size:40px;
  transform: rotate(-60deg);
  transform-origin: bottom;
}

/* таблица */
.sumTable{
  width:100%;
  font-size:40px;
  font-weight:900;
  text-align:center;
}

</style>
</head>

<body>
<div class="wrap">
  <div class="topbar">
    <div class="title">Bonus dashboard</div>
    <div class="status" id="status">Загрузка…</div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>RU</h2>
      <div id="chartRU" class="chartHost"></div>
    </div>

    <div class="row2">
      <div class="card engpl">
        <h2>ENG / PL</h2>
        <div id="chartENGPL" class="chartHost"></div>
      </div>

      <div class="card">
        <h2>Team ratings</h2>
        <div id="sumTableWrap"></div>
      </div>
    </div>
  </div>
</div>

<script>
const SPREADSHEET_ID = "123_11_j3y3KJhh45yomAOSFp3qP0Un7ePHxjcXQEhfs";
const GID = "1932060383";

const TARGET = 150000;
const REFRESH_MS = 90000;

const RANGES = {
  ru: "G2:H28",
  engpl: "C2:D8",
  sums: "P25:Q28",
};

const statusEl = document.getElementById("status");
const chartRU = document.getElementById("chartRU");
const chartENGPL = document.getElementById("chartENGPL");
const sumTableWrap = document.getElementById("sumTableWrap");

function csvUrl(range) {
  return `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${GID}&range=${range}&t=${Date.now()}`;
}

function parseCSV(text) {
  return text.split("\n").map(r=>r.split(","));
}

function toNumber(v) {
  return Number(String(v).replace(/\s/g,"").replace(",","."))||0;
}

/* ===== СТАБИЛЬНЫЙ CHART ===== */

function renderChart(container, data) {

  container.innerHTML = `
    <div class="plot">
      <canvas></canvas>
    </div>
    <div class="xlabels"></div>
  `;

  const canvas = container.querySelector("canvas");
  const labelsEl = container.querySelector(".xlabels");

  let items = data.map(r => ({
    name: r[0],
    value: toNumber(r[1])
  })).sort((a,b)=>b.value-a.value);

  labelsEl.innerHTML = items.map(i=>`<div class="xlabel">${i.name}</div>`).join("");

  function redraw() {
    const rect = canvas.parentElement.getBoundingClientRect();

    if (!rect.width || !rect.height) return;

    const dpr = Math.min(window.devicePixelRatio || 1, 1.5);

    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;

    const ctx = canvas.getContext("2d");
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,rect.width,rect.height);

    const max = Math.max(...items.map(x=>x.value),1);

    const barW = rect.width / items.length;

    items.forEach((it,i)=>{
      const h = (it.value / max) * rect.height;
      ctx.fillStyle = "#333";
      ctx.fillRect(i*barW, rect.height-h, barW-4, h);
    });
  }

  redraw();

  let resizeTimeout;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(redraw, 100);
  });
}

/* ===== TABLE ===== */

function renderTable(data){
  sumTableWrap.innerHTML = `
    <table class="sumTable">
      ${data.map(r=>`
        <tr>
          <td>${r[0]}</td>
          <td>${r[1]}</td>
        </tr>
      `).join("")}
    </table>
  `;
}

/* ===== LOAD ===== */

async function loadAll(){
  try{
    statusEl.textContent="Загрузка...";

    const [ru,engpl,sums]=await Promise.all([
      fetch(csvUrl(RANGES.ru)).then(r=>r.text()),
      fetch(csvUrl(RANGES.engpl)).then(r=>r.text()),
      fetch(csvUrl(RANGES.sums)).then(r=>r.text())
    ]);

    renderChart(chartRU, parseCSV(ru));
    renderChart(chartENGPL, parseCSV(engpl));
    renderTable(parseCSV(sums));

    statusEl.textContent="Обновлено "+new Date().toLocaleTimeString();

  }catch(e){
    statusEl.textContent="Ошибка";
  }
}

loadAll();
setInterval(loadAll, REFRESH_MS);

</script>
</body>
</html>
