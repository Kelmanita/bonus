<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bonus Dashboard</title>

<style>

html,body{
margin:0;
padding:0;
width:100vw;
height:100vh;
overflow:hidden;
background:#fff;
font-family:Arial,sans-serif;
}

body{
font-size:18px;
}

.wrap{
height:100vh;
display:flex;
flex-direction:column;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
border-bottom:1px solid #eee;
}

.title{
font-size:22px;
font-weight:800;
}

.status{
font-size:16px;
opacity:.75;
white-space:nowrap;
}

.grid{
flex:1;
display:grid;
grid-template-rows:1.7fr 1.3fr;
gap:14px;
padding:14px 18px;
box-sizing:border-box;
min-height:0;
}

.row2{
display:grid;
grid-template-columns:1fr;
justify-items:center;
align-items:center;
min-height:0;
}

.row2 > .card{
width:40%;
}

.card{
border:1px solid #eee;
border-radius:14px;
padding:14px;
box-sizing:border-box;
min-height:0;
overflow:hidden;
display:flex;
flex-direction:column;
}

.card h2{
margin:0 0 10px 0;
font-size:22px;
display:flex;
align-items:center;
gap:10px;
}

.chartHost{
flex:1;
min-height:0;
}

.vwrap{
height:100%;
display:grid;
grid-template-rows:22px 2fr 1fr;
gap:8px;
}

.cap{
display:flex;
justify-content:space-between;
align-items:center;
font-size:15px;
opacity:.75;
padding:0 6px;
}

.plot{
position:relative;
border:1px solid #eee;
border-radius:12px;
overflow:hidden;
background:
linear-gradient(to bottom, rgba(0,0,0,.08) 1px, transparent 1px);
background-size:100% 20%;
}

canvas{
width:100%;
height:100%;
display:block;
}

.targetLabel{
position:absolute;
right:8px;
font-size:13px;
font-weight:900;
color:#e11d48;
background:rgba(255,255,255,.92);
padding:2px 6px;
border-radius:999px;
}

.targetLine{
position:absolute;
left:0;
right:0;
height:2px;
background:#e11d48;
opacity:.85;
}

.xlabels{
display:flex;
justify-content:center;
gap:8px;
padding-top:20px;
}

.xlabel{
font-weight:900;
font-size:55px;
transform:rotate(-60deg);
transform-origin:center;
}

.sumTable{
width:100%;
border-collapse:separate;
border-spacing:0;
font-size:55px;
font-weight:900;
text-align:center;
border-radius:16px;
overflow:hidden;
}

.sumTable thead th{
background:#86b97a;
color:#000;
padding:18px 12px;
font-size:55px;
}

.sumTable td{
padding:20px 12px;
}

.sumLabel{
font-size:55px;
}

.sumVal{
font-size:55px;
font-variant-numeric:tabular-nums;
}

#sumTableWrap{
border-radius:18px;
box-shadow:0 8px 24px rgba(0,0,0,0.06);
overflow:hidden;
}

</style>
</head>

<body>

<div class="wrap">

<div class="topbar">
<div class="title">Bonus dashboard</div>
<div class="status" id="status">Загрузка…</div>
</div>

<div class="grid">

<div class="card">
<h2>RU</h2>
<div id="chartRU" class="chartHost"></div>
</div>

<div class="row2">

<div class="card">
<h2>Team ratings</h2>
<div id="sumTableWrap"></div>
</div>

</div>

</div>
</div>

<script>

const SPREADSHEET_ID="123_11_j3y3KJhh45yomAOSFp3qP0Un7ePHxjcXQEhfs";
const GID="1932060383";

const TARGET=150000;
const REFRESH_MS=90000;

const RANGES={
ru:"G2:H28",
sums:"P25:Q28"
};

const statusEl=document.getElementById("status");
const chartRU=document.getElementById("chartRU");
const sumTableWrap=document.getElementById("sumTableWrap");

function csvUrl(range){
return`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${GID}&range=${range}&t=${Date.now()}`
}

function parseCSV(text){

const rows=text.trim().split("\n");

return rows.map(r=>{
const c=r.split(",");
return[c[0],c[1]];
});

}

function toNumber(v){

const n=Number(String(v).replace(/\s/g,"").replace(",","."));
return isNaN(n)?0:n;

}

function colorForName(name){

const colors=[
"#1f2937",
"#334155",
"#0f766e",
"#1e40af",
"#6b21a8",
"#7c2d12",
"#065f46",
"#3f3f46"
];

let hash=0;

for(let i=0;i<name.length;i++){
hash=name.charCodeAt(i)+((hash<<5)-hash);
}

return colors[Math.abs(hash)%colors.length];

}

function niceMax(v){

const exp=Math.pow(10,Math.floor(Math.log10(v)));
const frac=v/exp;

if(frac<=1)return 1*exp;
if(frac<=2)return 2*exp;
if(frac<=5)return 5*exp;

return 10*exp;

}

function renderCanvasChart(container,pairs){

let items=pairs.map(r=>({name:r[0],value:toNumber(r[1])}));

items.sort((a,b)=>b.value-a.value);

const maxData=Math.max(...items.map(x=>x.value));
const axisMax=niceMax(maxData||1);

container.innerHTML=`

<div class="vwrap">

<div class="plot">

<div class="targetLine"></div>
<div class="targetLabel">ЦЕЛЬ ${TARGET}</div>

<canvas></canvas>

</div>

<div class="xlabels">

${items.map(it=>`<div class="xlabel">${it.name}</div>`).join("")}

</div>

</div>
`;

const canvas=container.querySelector("canvas");
const ctx=canvas.getContext("2d");

function draw(){

const rect=canvas.parentElement.getBoundingClientRect();

canvas.width=rect.width;
canvas.height=rect.height;

const W=rect.width;
const H=rect.height;

const gap=10;
const barW=(W/items.length)-gap;

items.forEach((it,i)=>{

const pct=it.value/axisMax;
const h=pct*H;

const x=i*(barW+gap);
const y=H-h;

ctx.fillStyle=colorForName(it.name);

ctx.fillRect(x,y,barW,h);

ctx.fillStyle="#000";
ctx.font="bold 40px Arial";
ctx.textAlign="center";

ctx.fillText(it.value,x+barW/2,y-5);

});

}

draw();
window.addEventListener("resize",draw);

}

function renderSumsTable(pairs){

sumTableWrap.innerHTML=`

<table class="sumTable">

<thead>
<tr><th colspan="2">Team ratings 📊</th></tr>
</thead>

<tbody>

${pairs.map(r=>`

<tr>
<td class="sumLabel">${r[0]}</td>
<td class="sumVal">${toNumber(r[1])}</td>
</tr>

`).join("")}

</tbody>

</table>

`;

}

async function loadAll(){

try{

statusEl.textContent="Загрузка…";

const [ruText,sumsText]=await Promise.all([

fetch(csvUrl(RANGES.ru)).then(r=>r.text()),
fetch(csvUrl(RANGES.sums)).then(r=>r.text())

]);

const ru=parseCSV(ruText);
const sums=parseCSV(sumsText);

renderCanvasChart(chartRU,ru);
renderSumsTable(sums);

statusEl.textContent="Обновлено: "+new Date().toLocaleTimeString();

}catch(e){

statusEl.textContent="Ошибка";

}

}

loadAll();
setInterval(loadAll,REFRESH_MS);

</script>

</body>
</html>
