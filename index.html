<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bonus Dashboard</title>

<style>
html, body {
  margin:0; padding:0;
  width:100vw; height:100vh;
  overflow:hidden;
  background:#fff;
  font-family: Arial, sans-serif;
}
body { font-size: 18px; }

.wrap { height:100vh; display:flex; flex-direction:column; }

.topbar{
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 18px;
  border-bottom:1px solid #eee;
}
.title{ font-size:22px; font-weight:800; }
.status{ font-size:16px; opacity:.75; white-space:nowrap; }

.grid{
  flex:1;
  display:grid;
  grid-template-rows: 1.7fr 1.3fr;
  gap:14px;
  padding:14px 18px;
  box-sizing:border-box;
  min-height:0;
}

.row2{
  display:grid;
  grid-template-columns: 1fr;
  gap:0;
  min-height:0;
}

.row2 > .card:first-child{ display:none; }

.row2 > .card:last-child{
  justify-self: center;
  align-self: center;
  width: 40%;
}

.card{
  border:1px solid #eee;
  border-radius:14px;
  padding:14px;
  box-sizing:border-box;
  min-height:0;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

.card.engpl {
  width: 75%;
  margin: 0 auto;
}

.chartHost{ flex:1 1 auto; min-height:0; }

.vwrap{
  height:100%;
  display:grid;
  grid-template-rows: 22px 2fr 1fr;
  gap:8px;
}

.vwrap.compact{
  grid-template-rows: 22px 2.2fr 1.3fr;
}

.plot{
  position:relative;
  border:1px solid #eee;
  border-radius:12px;
  overflow:hidden;
  background:
    linear-gradient(to bottom, rgba(0,0,0,.08) 1px, transparent 1px);
  background-size:100% 20%;
}

canvas{
  width:100%;
  height:100%;
  display:block;
}

.xlabels{
  display:flex;
  justify-content:center;
  gap:8px;
  padding:6px 10px 0;
}

.xlabel{
  width:60px;
  text-align:center;
  font-weight:700;
  font-size:14px;
  transform: rotate(-60deg);
  transform-origin: top center;
}

.xlabels.compact{
  gap:40px;
}

.sumTable{
  width:100%;
  font-size:55px;
  font-weight:900;
  text-align:center;
}

.card, .chartHost, .plot, .vwrap{
  min-width:0;
  min-height:0;
}
</style>
</head>

<body>
<div class="wrap">
  <div class="topbar">
    <div class="title">Bonus dashboard</div>
    <div class="status" id="status">Загрузка…</div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>RU</h2>
      <div id="chartRU" class="chartHost"></div>
    </div>

    <div class="row2">
      <div class="card engpl">
        <h2>ENG / PL</h2>
        <div id="chartENGPL" class="chartHost"></div>
      </div>

      <div class="card">
        <h2>Team ratings</h2>
        <div id="sumTableWrap"></div>
      </div>
    </div>
  </div>
</div>

<script>
const SPREADSHEET_ID = "123_11_j3y3KJhh45yomAOSFp3qP0Un7ePHxjcXQEhfs";
const GID = "1932060383";
const REFRESH_MS = 90000;

const RANGES = {
  ru: "G2:H28",
  engpl: "C2:D8",
  sums: "P25:Q28",
};

const COLORS = [
  "#1f2937","#334155","#0f766e","#1e40af",
  "#6b21a8","#7c2d12","#065f46","#3f3f46",
  "#0ea5e9","#16a34a","#dc2626","#9333ea"
];

const statusEl = document.getElementById("status");
const chartRU = document.getElementById("chartRU");
const chartENGPL = document.getElementById("chartENGPL");
const sumTableWrap = document.getElementById("sumTableWrap");

function csvUrl(range) {
  return `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${GID}&range=${range}&t=${Date.now()}`;
}

function parseCSV(text) {
  return text.split("\n").map(r=>r.split(","));
}

function toNumber(v) {
  return Number(String(v).replace(/\s/g,"").replace(",","."))||0;
}

function renderChart(container, pairs, opts = {}) {

  const compact = !!opts.compact;

  let items = pairs.map(r => ({ name: r[0] ?? "", value: toNumber(r[1]) }));
  items.sort((a,b) => b.value - a.value);

  container.innerHTML = `
    <div class="vwrap ${compact ? "compact" : ""}">
      <div></div>
      <div class="plot">
        <canvas></canvas>
      </div>
      <div class="xlabels ${compact ? "compact" : ""}"></div>
    </div>
  `;

  const plot = container.querySelector(".plot");
  const canvas = container.querySelector("canvas");
  const labelsEl = container.querySelector(".xlabels");

  labelsEl.innerHTML = items.map(it => `<div class="xlabel">${it.name}</div>`).join("");

  function redraw() {

    const rect = plot.getBoundingClientRect();
    if (!rect.width || !rect.height) return;

    const dpr = Math.min(window.devicePixelRatio || 1, 1.5);

    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;

    const ctx = canvas.getContext("2d");
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,rect.width,rect.height);

    const padTop = 40;
    const padBottom = 20;
    const padSide = 14;

    const W = rect.width - padSide * 2;
    const H = rect.height - padTop - padBottom;

    const max = Math.max(...items.map(x => x.value), 1);
    const gap = compact ? 40 : 8;

    const barW = Math.max(
      compact ? 60 : 12,
      Math.floor((W - gap * (items.length - 1)) / items.length)
    );

    const totalWidth = items.length * barW + (items.length - 1) * gap;
    let startX = padSide + Math.max(0, (W - totalWidth) / 2);

    labelsEl.style.gap = gap + "px";
    [...labelsEl.children].forEach(el => el.style.width = barW + "px");

    items.forEach((it, i) => {

      const h = (it.value / max) * H;

      const x = startX + i * (barW + gap);
      const y = padTop + (H - h);

      ctx.fillStyle = COLORS[i % COLORS.length];
      ctx.fillRect(x, y, barW, h);

      ctx.font = "700 14px Arial";
      ctx.fillStyle = "#000";
      ctx.textAlign = "center";

      ctx.fillText(
        it.value.toLocaleString(),
        x + barW / 2,
        y - 6
      );
    });
  }

  redraw();

  let resizeTimeout;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(redraw, 100);
  });
}

function renderTable(data){
  sumTableWrap.innerHTML = `
    <table class="sumTable">
      ${data.map(r=>`
        <tr>
          <td>${r[0]}</td>
          <td>${r[1]}</td>
        </tr>
      `).join("")}
    </table>
  `;
}

async function loadAll(){
  try{
    statusEl.textContent="Загрузка...";

    const [ru,engpl,sums]=await Promise.all([
      fetch(csvUrl(RANGES.ru)).then(r=>r.text()),
      fetch(csvUrl(RANGES.engpl)).then(r=>r.text()),
      fetch(csvUrl(RANGES.sums)).then(r=>r.text())
    ]);

    renderChart(chartRU, parseCSV(ru), { compact:false });
    renderChart(chartENGPL, parseCSV(engpl), { compact:true });
    renderTable(parseCSV(sums));

    statusEl.textContent="Обновлено "+new Date().toLocaleTimeString();

  }catch(e){
    statusEl.textContent="Ошибка";
  }
}

loadAll();
setInterval(loadAll, REFRESH_MS);
</script>
</body>
</html>
